<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore — интернет-магазин техники</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- ШАПКА САЙТА -->
    <header class="header">
        <div class="container header-container">
            <div class="logo">
                <a href="index.html">TechStore</a>
            </div>
            
            <!-- НАВИГАЦИЯ -->
            <nav class="nav" id="nav">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link active">Главная</a></li>
                    <li><a href="catalog.html" class="nav-link">Каталог</a></li>
                    <li><a href="favorites.html" class="nav-link">Избранное</a></li>
                    <li><a href="cart.html" class="nav-link">Корзина</a></li>
                    <li><a href="profile.html" class="nav-link">Профиль</a></li>
                </ul>
            </nav>
            
            <!-- БУРГЕР-МЕНЮ (для мобильных) -->
            <div class="burger" id="burger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            
            <!-- ИКОНКИ КОРЗИНЫ/ИЗБРАННОГО С БЕЙДЖАМИ -->
            <div class="header-icons">
                <a href="favorites.html" class="icon-link">
                    ❤️ <span class="badge" id="favCount">0</span>
                </a>
                <a href="cart.html" class="icon-link">
                    🛒 <span class="badge" id="cartCount">0</span>
                </a>
            </div>
        </div>
    </header>
    
    <!-- HERO-СЕКЦИЯ (ГЛАВНЫЙ БАННЕР) -->
    <section class="hero">
        <div class="container hero-container">
            <h1 class="hero-title">Добро пожаловать в TechStore</h1>
            <p class="hero-text">Лучшая техника по лучшим ценам</p>
            <a href="catalog.html" class="btn btn-primary">Перейти к покупкам</a>
        </div>
    </section>
    
    <script src="data.js"></script>
    <script src="common.js"></script>
</body>
</html>
